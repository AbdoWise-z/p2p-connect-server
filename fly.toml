# fly.toml file for your project

app = "p2p-connect-server"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 8000
  protocol = "tcp"

  [services.concurrency]
    soft_limit = 25
    hard_limit = 50
    type = "requests"

  [services.ports]
    handlers = ["http"]
    port = 80

  [services.env]
    REDIS_URL = "redis://redis:6379"
    KNOWN_PUBKEYS = ""  # Leave empty for dev environment
    LOG_LEVEL = "info"

  [[services.volumes]]
    volume = "redis_data"
    mount_path = "/data"

[[services]]
  internal_port = 6379  # Redis service should expose the Redis port internally
  protocol = "tcp"
  [services.volumes]
    volume = "redis_data"
    mount_path = "/data"

[[mounts]]
  destination = "/data"
  source = "redis_data"  # Persist Redis data using the volume from Fly.io

[[statics]]
  directory = "static"
  url_prefix = "/static"

[build]
  dockerfile = "Dockerfile"

[env]
  # Define any environment variables here that should be globally accessible
  # Example:
  # ENV_VARIABLE = "value"